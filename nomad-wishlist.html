<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wishlist — Nomad</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #EAEBE6;
            --ink: #111111;
            --ink-light: #555555;
            --pastel-sand: #EAE0CC;
            --pastel-blue: #B5C6E8;
            --pastel-green: #BBD2BC;
            --pastel-lilac: #C4B1D6;
            --font-serif: 'Instrument Serif', serif;
            --font-sans: 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --border-style: 1px solid var(--ink);
            --safe-padding: 20px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body {
            background-color: var(--bg-color);
            color: var(--ink);
            font-family: var(--font-sans);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: var(--safe-padding); border-bottom: var(--border-style);
            position: sticky; top: 0; background-color: var(--bg-color); z-index: 100;
        }

        .nav-actions { display: flex; gap: 16px; }

        .icon-btn {
            background: none; border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center; color: var(--ink);
        }
        .icon-btn svg { width: 20px; height: 20px; stroke-width: 1.5; }

        .back-btn {
            display: flex; align-items: center; gap: 8px;
            font-family: var(--font-mono); font-size: 0.65rem;
            text-transform: uppercase; text-decoration: none; color: var(--ink);
        }

        main { padding: var(--safe-padding); }

        .page-header { margin: 24px 0 32px 0; }

        .page-title {
            font-family: var(--font-serif); font-size: 3.5rem;
            line-height: 1; letter-spacing: -0.02em;
        }

        .toggle-container {
            margin-top: 24px; display: flex;
            border: var(--border-style); border-radius: 40px;
            padding: 4px; width: fit-content;
        }

        .toggle-btn {
            padding: 8px 20px; border-radius: 30px; border: none;
            font-size: 0.7rem; font-weight: 600; text-transform: uppercase;
            letter-spacing: 0.05em; cursor: pointer;
            background: transparent; color: var(--ink-light); transition: all 0.2s ease;
        }
        .toggle-btn.active { background: var(--ink); color: var(--bg-color); }

        .mood-grid {
            display: grid; grid-template-columns: repeat(2, 1fr);
            gap: 16px; margin-top: 16px;
        }

        .mood-item { display: flex; flex-direction: column; gap: 12px; }
        .mood-item:nth-child(even) { margin-top: 32px; }

        .mood-media {
            position: relative; width: 100%; border-radius: 12px;
            overflow: hidden; border: 0.5px solid rgba(0,0,0,0.05);
        }

        .media-tall { aspect-ratio: 3/4.5; }
        .media-square { aspect-ratio: 1/1; }
        .media-short { aspect-ratio: 4/3; }

        .mood-media img { width: 100%; height: 100%; object-fit: cover; }

        .mood-meta { padding: 0 4px; }

        .mood-title {
            font-family: var(--font-serif); font-size: 1.4rem;
            line-height: 1.1; margin-bottom: 4px;
        }

        .mood-tag {
            font-family: var(--font-mono); font-size: 0.6rem;
            color: var(--ink-light); text-transform: uppercase;
        }

        .heart-active {
            position: absolute; top: 12px; right: 12px;
            background: rgba(234, 235, 230, 0.9);
            width: 28px; height: 28px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; border: none;
            cursor: pointer;
        }

        .collection-summary {
            margin-top: 64px; padding: 32px 0; border-top: var(--border-style);
        }

        .summary-label {
            font-family: var(--font-mono); font-size: 0.65rem;
            text-transform: uppercase; color: var(--ink-light);
            margin-bottom: 16px; display: block; letter-spacing: 0.1em;
        }

        .stat-row {
            display: flex; justify-content: space-between;
            align-items: baseline; margin-bottom: 8px;
        }

        .stat-name { font-family: var(--font-serif); font-size: 1.8rem; }

        .stat-dots {
            flex-grow: 1; border-bottom: 1px dotted var(--ink-light);
            margin: 0 12px; position: relative; top: -6px;
        }

        .stat-val { font-family: var(--font-mono); font-size: 1.1rem; }

        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--bg-color);
            border-top: var(--border-style);
            display: flex; justify-content: space-around; align-items: center;
            padding: 12px 0; padding-bottom: max(12px, env(safe-area-inset-bottom));
            z-index: 100;
        }
        .nav-tab {
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            text-decoration: none; color: var(--ink-light); transition: color 0.2s;
        }
        .nav-tab.active { color: var(--ink); }
        .nav-tab svg { width: 22px; height: 22px; }
        .nav-tab span {
            font-family: var(--font-mono); font-size: 0.55rem;
            text-transform: uppercase; letter-spacing: 0.05em;
        }
        .collection-summary { margin-bottom: 80px; }
        .mood-item { cursor: pointer; }
    </style>
</head>
<body>

    <header class="top-bar">
        <a href="/nomad.html" class="back-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 12H5M12 19l-7-7 7-7"></path>
            </svg>
            Back
        </a>
        <div class="nav-actions">
            <button class="icon-btn" aria-label="Settings">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                </svg>
            </button>
        </div>
    </header>

    <main>
        <header class="page-header">
            <h1 class="page-title">Wishlist</h1>
            <div class="toggle-container">
                <button class="toggle-btn">Planned</button>
                <button class="toggle-btn active">Dreaming</button>
            </div>
        </header>

        <section class="mood-grid">
            <div class="mood-item">
                <div class="mood-media media-tall">
                    <img src="https://images.pexels.com/photos/258154/pexels-photo-258154.jpeg?auto=compress&cs=tinysrgb&w=400" alt="Minimalist pool">
                    <button class="heart-active">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                        </svg>
                    </button>
                </div>
                <div class="mood-meta">
                    <h3 class="mood-title">Aegean Blue</h3>
                    <span class="mood-tag">Cyclades, GR</span>
                </div>
            </div>

            <div class="mood-item">
                <div class="mood-media media-square">
                    <img src="https://images.pexels.com/photos/1005456/pexels-photo-1005456.jpeg?auto=compress&cs=tinysrgb&w=400" alt="Mountain cabin">
                    <button class="heart-active">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                        </svg>
                    </button>
                </div>
                <div class="mood-meta">
                    <h3 class="mood-title">Alpine Glass</h3>
                    <span class="mood-tag">Dolomites, IT</span>
                </div>
            </div>

            <div class="mood-item">
                <div class="mood-media media-short">
                    <img src="https://images.pexels.com/photos/2101187/pexels-photo-2101187.jpeg?auto=compress&cs=tinysrgb&w=400" alt="Desert landscape">
                    <button class="heart-active">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                        </svg>
                    </button>
                </div>
                <div class="mood-meta">
                    <h3 class="mood-title">Ochre Sands</h3>
                    <span class="mood-tag">Wadi Rum, JO</span>
                </div>
            </div>

            <div class="mood-item">
                <div class="mood-media media-tall">
                    <img src="https://images.pexels.com/photos/2042109/pexels-photo-2042109.jpeg?auto=compress&cs=tinysrgb&w=400" alt="Kyoto street">
                    <button class="heart-active">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                        </svg>
                    </button>
                </div>
                <div class="mood-meta">
                    <h3 class="mood-title">Zen Wood</h3>
                    <span class="mood-tag">Kyoto, JP</span>
                </div>
            </div>
        </section>

        <section class="collection-summary">
            <span class="summary-label">Current Inventory</span>
            <div class="stat-row">
                <span class="stat-name">Active Trips</span>
                <span class="stat-dots"></span>
                <span class="stat-val">02</span>
            </div>
            <div class="stat-row">
                <span class="stat-name">Wishlist Items</span>
                <span class="stat-dots"></span>
                <span class="stat-val">14</span>
            </div>
            <div class="stat-row">
                <span class="stat-name">Avg. Duration</span>
                <span class="stat-dots"></span>
                <span class="stat-val">9d</span>
            </div>
        </section>
    </main>

    <nav class="bottom-nav">
        <a href="/nomad.html" class="nav-tab">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></svg>
            <span>Explore</span>
        </a>
        <a href="/nomad-wishlist.html" class="nav-tab active">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
            <span>Wishlist</span>
        </a>
        <a href="/nomad-setup.html" class="nav-tab">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            <span>Profile</span>
        </a>
    </nav>

    <script>
        document.querySelectorAll('.toggle-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.toggle-btn').forEach(function(b) { b.classList.remove('active'); });
                this.classList.add('active');
            });
        });

        document.querySelectorAll('.heart-active').forEach(function(btn) {
            btn.addEventListener('click', function(e) {
                e.stopPropagation();
                var svg = this.querySelector('svg');
                if (svg.getAttribute('fill') === 'currentColor') {
                    svg.setAttribute('fill', 'none');
                    svg.setAttribute('stroke', 'currentColor');
                } else {
                    svg.setAttribute('fill', 'currentColor');
                    svg.removeAttribute('stroke');
                }
            });
        });

        document.querySelectorAll('.mood-item').forEach(function(item) {
            item.addEventListener('click', function() {
                window.location = '/nomad-detail.html';
            });
        });
    </script>
</body>
</html>
